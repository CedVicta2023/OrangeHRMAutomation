name: OrangeHRM Automation Build
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Runs at 00:00 every Sunday (UTC)
    - cron: '0 0 * * 0'
jobs:
  test:
    name: OrangeHRM Automation Tests
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers with dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          npx playwright test
          # Optionally include trace and screenshots only on failure—for debugging
          # e.g. configure in playwright.config.ts:
          # trace: 'on-first-retry', screenshot: 'only-on-failure'

   - name: Generate Allure Report
  uses: simple-elf/allure-report-action@master
  if: always()
  with:
    allure_results: allure-results # Must match your config
    allure_history: allure-history
    keep_reports: 20
